<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FROM TEXT TO FEELING - 감성 분석 서비스</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body>
  <header class="header">
    <div class="header-container">
      <div class="logo">FTTF.</div>
      <div class="desc">AI Sentiment Analyzer</div>
    </div>
  </header>

  <main class="main-container">
    <section class="hero">
      <h1 class="hero-title">FROM TEXT<br>TO FEELING</h1>
      <p class="hero-subtitle">문장을 입력하면 AI가 감성을 분석합니다.</p>
    </section>

    <section class="content-area">
      <div class="panel input-panel">
        <textarea id="text-input" placeholder="분석할 문장을 입력해주세요 (예: 오늘 하루 정말 최고였어!)" rows="4"></textarea>
        <button id="analyze-btn">분석하기</button>
      </div>

      <div id="error-box" class="error-box hidden">
        <p id="error-message"></p>
      </div>

      <div id="result-card" class="panel result-card hidden">
        <div class="result-header">
          <span id="sentiment-label" class="sentiment-badge"></span>
          <span id="confidence-label" class="confidence-text"></span>
        </div>
        <p id="reason-text" class="reason-text"></p>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>

</html>
